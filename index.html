<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- Comentario estructural: Este bloque concentra metadatos SEO, accesibilidad y recursos compartidos que usa esta página y que se coordinan con el resto de rutas del sitio. -->
    <!-- Define codificación y viewport para garantizar renderizado correcto y consistente en todos los idiomas y secciones. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- El título y la descripción se adaptan a la ruta actual y mantienen coherencia semántica con la navegación interna. -->
    <title>Synnergy Lab | Selección de idioma</title>
    <meta name="description" content="Entrada principal de Synnergy Lab. La versión en español carga por defecto y también puedes acceder a la versión en inglés." />
    <meta http-equiv="refresh" content="0; url=/es/" />
    <!-- Canonical y hreflang conectan esta URL con sus equivalentes en español/inglés, evitando contenido duplicado y guiando buscadores. -->
    <link rel="canonical" href="/es/" />
    <link rel="alternate" hreflang="es" href="/es/" />
    <link rel="alternate" hreflang="en" href="/en/" />
    <link rel="alternate" hreflang="x-default" href="/es/" />
    <!-- Hoja de estilos global: enlaza con la misma base visual usada por todos los HTML para mantener una identidad unificada. -->
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <!-- El cuerpo define el contexto de página (home o interior) que aprovechan los estilos y scripts compartidos. -->
  <body class="page-home">
    <!-- Contenido principal: agrupa bloques funcionales de valor (hero + contenido) y sirve como referencia para accesibilidad. -->
    <main id="main-content">
      <!-- Hero: presenta la propuesta central de la ruta actual y orienta al usuario hacia acciones prioritarias mediante CTAs. -->
      <section class="hero-section">
        <div class="container hero-grid">
          <!-- Mensaje principal del hero: título, contexto y narrativa alineada con el objetivo de esta página dentro del embudo. -->
          <div class="hero-copy">
            <h1>Redirigiendo a Synnergy Lab en español</h1>
            <p class="eyebrow">Idioma por defecto</p>
            <p class="lead">La raíz del sitio actúa como entrada neutra y envía por defecto a <strong>/es/</strong> para mantener una arquitectura clara por idioma.</p>
            <!-- Acciones clave: conectan con rutas internas estratégicas (contacto, servicios, proyectos, etc.) para sostener la navegación. -->
            <div class="button-row">
              <a class="button button-primary" href="/es/">Ir a español</a>
              <a class="button button-secondary" href="/en/">Go to English</a>
            </div>
          </div>
          <!-- Panel complementario del hero: resume beneficios/cobertura y refuerza lo expuesto en el bloque principal. -->
          <aside class="hero-panel card">
            <h2>Acceso rápido</h2>
            <ul class="feature-list">
              <li>Español en <code>/es/</code></li>
              <li>English in <code>/en/</code></li>
              <li>Marca unificada: Synnergy Lab</li>
            </ul>
          </aside>
        </div>
      </section>
    </main>
  </body>
</html>
